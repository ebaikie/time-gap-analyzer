<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Gap Analyzer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&family=Outfit:wght@300;400;600;700&display=swap');

        :root {
            --bg: #fef7ff; --sf: #ffffff; --bd: #ede9fe;
            --tx: #3b1f5e; --t2: #7c5ab8; --ac: #7c3aed;
            --ac-l: #f3eeff;
            --err: #c0392b; --ok: #27ae60; --overlap: #c45c00;
            --err-bg: #fde8e8; --ok-bg: #e4f7ec; --overlap-bg: #fef3e0;
            --overlap-tx: #c45c00;
            --header-bg: #7c3aed; --header-tx: #ffffff;
            --btn-tx: #ffffff;
            --fn: 'Nunito'; color-scheme: light;
        }
        [data-theme="dark"] {
            --bg: #050a1c; --sf: rgba(255,255,255,.04); --bd: rgba(255,255,255,.07);
            --tx: rgba(255,255,255,.8); --t2: rgba(255,255,255,.2); --ac: #4dffa6;
            --ac-l: rgba(77,255,166,0.10);
            --err: #ff6b6b; --ok: #51cf66; --overlap: #ffa94d;
            --err-bg: rgba(255,107,107,0.12); --ok-bg: rgba(81,207,102,0.12); --overlap-bg: rgba(255,169,77,0.12);
            --overlap-tx: #ffa94d;
            --header-bg: #050a1c; --header-tx: #4dffa6;
            --btn-tx: #050a1c;
            --fn: 'Outfit'; color-scheme: dark;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--fn), sans-serif;
            background: var(--bg);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--sf);
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: var(--header-bg);
            color: var(--header-tx);
            padding: 18px 24px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .header-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .header-brand h1 {
            font-size: 1.05rem;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .header p {
            font-size: 12px;
            opacity: 0.7;
            margin: 0;
        }

        .content {
            padding: 40px 30px;
            color: var(--tx);
        }

        .upload-area {
            border: 2px dashed var(--ac);
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--sf);
            margin: 0 26px;
        }

        .upload-area:hover {
            border-color: var(--ac);
            background: var(--ac-l);
        }

        .upload-area.dragover {
            border-color: var(--ac);
            background: var(--ac-l);
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 14px;
        }

        .upload-text {
            color: var(--tx);
        }

        .upload-text strong {
            display: block;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--ac);
        }

        .upload-text small {
            color: var(--t2);
            font-size: 0.8rem;
        }

        #imageInput {
            display: none;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 30px;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid var(--bd);
            border-top-color: var(--ac);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading p {
            color: var(--t2);
        }

        .results {
            display: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .results.visible {
            display: block;
        }

        .summary {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--sf);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--bd);
            border-left: 4px solid var(--ac);
        }

        .stat-card.warning {
            border-left-color: var(--err);
            background: var(--err-bg);
        }

        .stat-card.success {
            border-left-color: var(--ok);
            background: var(--ok-bg);
        }

        .stat-label {
            font-size: 12px;
            color: var(--t2);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 600;
            color: var(--tx);
        }

        .stat-card.warning .stat-value {
            color: var(--err);
        }

        .stat-card.success .stat-value {
            color: var(--ok);
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--tx);
            margin-bottom: 16px;
            margin-top: 30px;
        }

        .section-title:first-child {
            margin-top: 0;
        }

        .timeline {
            background: var(--sf);
            border: 1px solid var(--bd);
            border-radius: 8px;
            overflow: hidden;
        }

        .timeline-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid var(--bd);
            font-size: 14px;
        }

        .timeline-entry:last-child {
            border-bottom: none;
        }

        .timeline-time {
            color: var(--ac);
            font-weight: 500;
            min-width: 100px;
        }

        .timeline-duration {
            background: var(--bg);
            border: 1px solid var(--bd);
            padding: 4px 12px;
            border-radius: 4px;
            color: var(--t2);
            font-size: 12px;
        }

        .gaps-container {
            margin-top: 20px;
        }

        .gap-item {
            background: var(--err-bg);
            border-left: 4px solid var(--err);
            padding: 16px;
            border-radius: 6px;
            margin-bottom: 12px;
        }

        .gap-item.no-gaps {
            background: var(--ok-bg);
            border-left-color: var(--ok);
        }

        .gap-item.overlap-item {
            background: var(--overlap-bg);
            border-left-color: var(--overlap);
        }

        .gap-item.overlap-item .gap-title {
            color: var(--overlap-tx);
        }

        .gap-item.warn-item {
            background: var(--err-bg);
            border-left-color: var(--err);
        }

        .gap-item.warn-item .gap-title {
            color: var(--err);
        }

        .gap-title {
            font-weight: 600;
            color: var(--err);
            margin-bottom: 6px;
            font-size: 14px;
        }

        .gap-item.no-gaps .gap-title {
            color: var(--ok);
        }

        .gap-time {
            color: var(--t2);
            font-size: 13px;
        }

        .error {
            display: none;
            background: var(--err-bg);
            border-left: 4px solid var(--err);
            padding: 16px;
            border-radius: 6px;
            color: var(--err);
            margin-bottom: 20px;
        }

        .error.visible {
            display: block;
        }

        .button-group {
            margin-top: 30px;
            text-align: center;
        }

        .btn {
            background: var(--ac);
            color: var(--btn-tx);
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            font-family: var(--fn), sans-serif;
            transition: all 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            opacity: 0.88;
        }

        .btn:active {
            transform: translateY(0);
        }

        .date-display {
            color: var(--t2);
            font-size: 12px;
            margin-top: 16px;
            text-align: center;
        }

        .ext-links {
            display: flex;
            justify-content: flex-start;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .ext-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            text-decoration: none;
            background: rgba(255,255,255,0.15);
            color: inherit;
            border: 1px solid rgba(255,255,255,0.35);
            transition: background 0.2s;
        }

        .ext-link:hover {
            background: rgba(255,255,255,0.28);
        }

        .ext-link.soon {
            opacity: 0.45;
            cursor: default;
            pointer-events: none;
        }

        .settings-panel {
            margin-top: 12px;
            margin-bottom: 20px;
            margin-left: 26px;
            margin-right: 26px;
        }

        .settings-panel summary {
            display: inline-block;
            padding: 10px 24px;
            cursor: pointer;
            font-size: 0.86rem;
            font-weight: 600;
            letter-spacing: 0.01em;
            color: var(--btn-tx);
            background: var(--ac);
            border-radius: 8px;
            user-select: none;
            list-style: none;
            transition: opacity 0.15s, transform 0.1s;
        }

        .settings-panel summary:hover { opacity: 0.88; }
        .settings-panel summary:active { transform: scale(0.97); }

        .settings-panel summary::-webkit-details-marker { display: none; }

        .settings-panel summary::before {
            content: '⚙ ';
        }

        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            padding: 16px;
            margin-top: 8px;
            background: var(--sf);
            border: 1px solid var(--bd);
            border-radius: 8px;
        }

        .settings-grid label {
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-size: 13px;
            color: var(--t2);
        }

        .settings-grid input {
            padding: 8px 10px;
            border: 1px solid var(--bd);
            border-radius: 6px;
            font-size: 14px;
            color: var(--tx);
            background: var(--bg);
            font-family: var(--fn), sans-serif;
        }

        .settings-grid input:focus {
            outline: none;
            border-color: var(--ac);
        }

        .gap-item.req-item {
            background: var(--overlap-bg);
            border-left-color: var(--overlap);
        }

        .gap-item.req-item .gap-title {
            color: var(--overlap-tx);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-bar">
                <div class="header-brand">
                    <h1>⏱️ Time Gap Analyzer</h1>
                    <p>No cloud · no external APIs · in-memory · no data stored · <a href="/example.png" target="_blank" style="color:inherit;opacity:0.85">view example</a> · <a href="/privacy" style="color:inherit;opacity:0.85">privacy</a></p>
                </div>
                <button id="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode" style="flex-shrink:0;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.35);color:inherit;border-radius:6px;padding:4px 12px;cursor:pointer;font-size:0.75rem;font-family:inherit;letter-spacing:0.04em;transition:background 0.2s">🌙 Dark</button>
            </div>
            <div class="ext-links">
                <a class="ext-link" href="https://chromewebstore.google.com/detail/hfiloaakinclbfkfaojjdgfjaciegoab?utm_source=item-share-cb" target="_blank" rel="noopener">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20.5 11H19V7c0-1.1-.9-2-2-2h-4V3.5C13 2.12 11.88 1 10.5 1S8 2.12 8 3.5V5H4c-1.1 0-2 .9-2 2v3.8h1.5c1.49 0 2.7 1.21 2.7 2.7s-1.21 2.7-2.7 2.7H2V20c0 1.1.9 2 2 2h3.8v-1.5c0-1.49 1.21-2.7 2.7-2.7 1.49 0 2.7 1.21 2.7 2.7V22H17c1.1 0 2-.9 2-2v-4h1.5c1.38 0 2.5-1.12 2.5-2.5S21.88 11 20.5 11z"/></svg>
                    Chrome
                </a>
                <a class="ext-link" href="https://addons.mozilla.org/en-US/firefox/addon/time-gap-analyzer/" target="_blank" rel="noopener">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20.5 11H19V7c0-1.1-.9-2-2-2h-4V3.5C13 2.12 11.88 1 10.5 1S8 2.12 8 3.5V5H4c-1.1 0-2 .9-2 2v3.8h1.5c1.49 0 2.7 1.21 2.7 2.7s-1.21 2.7-2.7 2.7H2V20c0 1.1.9 2 2 2h3.8v-1.5c0-1.49 1.21-2.7 2.7-2.7 1.49 0 2.7 1.21 2.7 2.7V22H17c1.1 0 2-.9 2-2v-4h1.5c1.38 0 2.5-1.12 2.5-2.5S21.88 11 20.5 11z"/></svg>
                    Firefox
                </a>
                <span class="ext-link soon">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20.5 11H19V7c0-1.1-.9-2-2-2h-4V3.5C13 2.12 11.88 1 10.5 1S8 2.12 8 3.5V5H4c-1.1 0-2 .9-2 2v3.8h1.5c1.49 0 2.7 1.21 2.7 2.7s-1.21 2.7-2.7 2.7H2V20c0 1.1.9 2 2 2h3.8v-1.5c0-1.49 1.21-2.7 2.7-2.7 1.49 0 2.7 1.21 2.7 2.7V22H17c1.1 0 2-.9 2-2v-4h1.5c1.38 0 2.5-1.12 2.5-2.5S21.88 11 20.5 11z"/></svg>
                    Edge — coming soon
                </span>
            </div>
        </div>

        <div class="content">
            <div class="error" id="error"></div>

            <div class="upload-area" id="uploadArea">
                <input type="file" id="imageInput" accept="image/*">
                <div class="upload-icon">📸</div>
                <div class="upload-text">
                    <strong>Upload a screenshot</strong>
                    <small>Click or drag & drop to select</small>
                </div>
            </div>

            <details class="settings-panel">
                <summary>Settings</summary>
                <div class="settings-grid">
                    <label>
                        Required start time
                        <input type="time" id="requiredStart" value="08:00">
                    </label>
                    <label>
                        Minimum logged hours
                        <input type="time" id="minHours" value="08:30">
                    </label>
                </div>
            </details>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Analyzing screenshot...</p>
            </div>

            <div class="results" id="results">
                <div class="summary">
                    <div class="stat-card">
                        <div class="stat-label">Total logged</div>
                        <div class="stat-value" id="totalHours">0h 0m</div>
                    </div>
                    <div class="stat-card" id="gapCard">
                        <div class="stat-label">Gaps found</div>
                        <div class="stat-value" id="gapCount">0</div>
                    </div>
                </div>

                <div class="section-title">Timeline</div>
                <div class="timeline" id="timeline"></div>

                <div class="gaps-container" id="gapsContainer"></div>
                <div class="gaps-container" id="overlapContainer"></div>
                <div class="gaps-container" id="requirementsContainer"></div>
                <div class="gaps-container" id="warningContainer"></div>

                <div class="date-display" id="dateDisplay"></div>

                <div class="button-group">
                    <button class="btn" onclick="resetForm()">Analyze Another</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const imageInput = document.getElementById('imageInput');
        const loading = document.getElementById('loading');
        const results = document.getElementById('results');
        const error = document.getElementById('error');

        uploadArea.addEventListener('click', () => imageInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files[0]) {
                analyzeImage(e.dataTransfer.files[0]);
            }
        });

        imageInput.addEventListener('change', (e) => {
            if (e.target.files[0]) {
                analyzeImage(e.target.files[0]);
            }
        });

        async function analyzeImage(file) {
            loading.style.display = 'block';
            results.style.display = 'none';
            error.classList.remove('visible');

            const formData = new FormData();
            formData.append('image', file);
            formData.append('required_start', document.getElementById('requiredStart').value || '08:00');
            formData.append('min_hours', document.getElementById('minHours').value || '08:30');

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Analysis failed');
                }

                displayResults(data);
            } catch (err) {
                error.textContent = '❌ ' + err.message;
                error.classList.add('visible');
            } finally {
                loading.style.display = 'none';
            }
        }

        function displayResults(data) {
            // Summary stats
            document.getElementById('totalHours').textContent = data.total_display;
            document.getElementById('gapCount').textContent = data.gap_count;

            // Update gap card styling
            const gapCard = document.getElementById('gapCard');
            gapCard.classList.remove('warning', 'success');
            if (data.has_gaps) {
                gapCard.classList.add('warning');
            } else {
                gapCard.classList.add('success');
            }

            // Timeline
            const hhmmToMins = (t) => parseInt(t.slice(0, 2), 10) * 60 + parseInt(t.slice(2), 10);
            const timelineHtml = data.entries.map(entry => {
                const mins = hhmmToMins(entry.end) - hhmmToMins(entry.start);
                const durH = Math.floor(mins / 60);
                const durM = mins % 60;
                const durLabel = durH > 0 ? `${durH}h ${durM}m` : `${durM}m`;
                return `
                <div class="timeline-entry">
                    <span class="timeline-time">${entry.start.slice(0, 2)}:${entry.start.slice(2)} → ${entry.end.slice(0, 2)}:${entry.end.slice(2)}</span>
                    <span class="timeline-duration">${durLabel}</span>
                </div>
            `;
            }).join('');
            document.getElementById('timeline').innerHTML = timelineHtml;

            // Gaps
            let gapsHtml = '';
            if (data.gaps.length === 0) {
                gapsHtml = `
                    <div class="gap-item no-gaps">
                        <div class="gap-title">✓ No missing time detected</div>
                        <div class="gap-time">Your schedule is continuous</div>
                    </div>
                `;
            } else {
                gapsHtml = data.gaps.map(gap => `
                    <div class="gap-item">
                        <div class="gap-title">⏸ Missing: ${gap.duration_display}</div>
                        <div class="gap-time">${gap.start} → ${gap.end}</div>
                    </div>
                `).join('');
            }
            document.getElementById('gapsContainer').innerHTML = gapsHtml;

            // Overlaps (data-entry warning)
            let overlapHtml = '';
            if (data.overlaps && data.overlaps.length > 0) {
                overlapHtml = data.overlaps.map(o => `
                    <div class="gap-item overlap-item">
                        <div class="gap-title">⚠ Overlap: ${o.duration_display}</div>
                        <div class="gap-time">starting at ${o.at} — check for a data-entry error</div>
                    </div>
                `).join('');
            }
            document.getElementById('overlapContainer').innerHTML = overlapHtml;

            // Requirement issues (late start / short hours)
            let reqHtml = '';
            if (data.requirement_issues && data.requirement_issues.length > 0) {
                reqHtml = data.requirement_issues.map(r => `
                    <div class="gap-item req-item">
                        <div class="gap-title">⚠ ${r.message}</div>
                        <div class="gap-time">${r.detail}</div>
                    </div>
                `).join('');
            }
            document.getElementById('requirementsContainer').innerHTML = reqHtml;

            // OCR / validation warnings
            let warnHtml = '';
            if (data.warnings && data.warnings.length > 0) {
                warnHtml = data.warnings.map(w => `
                    <div class="gap-item warn-item">
                        <div class="gap-title">⚠ Check this read</div>
                        <div class="gap-time">${w}</div>
                    </div>
                `).join('');
            }
            document.getElementById('warningContainer').innerHTML = warnHtml;

            // Date display
            document.getElementById('dateDisplay').textContent = `Date: ${data.date}`;

            results.classList.add('visible');
            results.style.display = 'block';
        }

        function resetForm() {
            imageInput.value = '';
            results.style.display = 'none';
            results.classList.remove('visible');
            uploadArea.style.display = 'block';
            error.classList.remove('visible');
        }

        function applyTheme(t) {
            document.documentElement.setAttribute('data-theme', t);
            document.getElementById('theme-toggle').textContent = t === 'dark' ? '☀️ Light' : '🌙 Dark';
        }
        function toggleTheme() {
            const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            localStorage.setItem('theme', next);
            applyTheme(next);
        }
        (function() {
            const saved = localStorage.getItem('theme') ||
                (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            applyTheme(saved);
        })();
    </script>
</body>
</html>
